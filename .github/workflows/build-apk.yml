name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest
    timeout-minutes: 40

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Capacitor CLI globally
        run: npm install -g @capacitor/cli

      - name: Install project dependencies
        run: npm install
        env:
          NODE_ENV: development

      - name: Generate chipRegistry.ts from chips.json
        run: node scripts/generate-registry.cjs

      - name: Build web app
        run: npx vite build

      - name: Add Capacitor Android platform
        run: cap add android

      - name: Sync Capacitor
        run: cap sync android

      - name: Write MainActivity.java with NFC support
        run: |
          cat > android/app/src/main/java/com/ntag424scanner/app/MainActivity.java << 'JAVAEOF'
          package com.ntag424scanner.app;
          import android.app.PendingIntent;
          import android.content.Intent;
          import android.nfc.NfcAdapter;
          import android.nfc.Tag;
          import android.os.Bundle;
          import com.getcapacitor.BridgeActivity;
          public class MainActivity extends BridgeActivity {
              private Ntag424Plugin nfcPlugin;
              private NfcAdapter nfcAdapter;
              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  registerPlugin(Ntag424Plugin.class);
                  super.onCreate(savedInstanceState);
                  nfcAdapter = NfcAdapter.getDefaultAdapter(this);
                  nfcPlugin = (Ntag424Plugin) getBridge().getPlugin("Ntag424").getInstance();
              }
              @Override
              public void onResume() {
                  super.onResume();
                  if (nfcAdapter != null && nfcAdapter.isEnabled()) {
                      PendingIntent pendingIntent = PendingIntent.getActivity(
                          this, 0,
                          new Intent(this, getClass()).addFlags(Intent.FLAG_ACTIVITY_SINGLE_TOP),
                          PendingIntent.FLAG_MUTABLE);
                      nfcAdapter.enableForegroundDispatch(this, pendingIntent, null, null);
                  }
              }
              @Override
              public void onPause() {
                  super.onPause();
                  if (nfcAdapter != null) nfcAdapter.disableForegroundDispatch(this);
              }
              @Override
              public void onNewIntent(Intent intent) {
                  super.onNewIntent(intent);
                  Tag tag = intent.getParcelableExtra(NfcAdapter.EXTRA_TAG);
                  if (tag != null && nfcPlugin != null) nfcPlugin.handleTag(tag);
              }
          }
          JAVAEOF

      - name: Write Ntag424Plugin.java
        run: |
          cat > android/app/src/main/java/com/ntag424scanner/app/Ntag424Plugin.java << 'JAVAEOF'
          package com.ntag424scanner.app;

          import android.nfc.Tag;
          import android.nfc.NdefMessage;
          import android.nfc.NdefRecord;
          import android.nfc.tech.Ndef;
          import android.nfc.tech.NdefFormatable;
          import android.util.Log;
          import com.getcapacitor.JSObject;
          import com.getcapacitor.Plugin;
          import com.getcapacitor.PluginCall;
          import com.getcapacitor.PluginMethod;
          import com.getcapacitor.annotation.CapacitorPlugin;
          import java.nio.charset.StandardCharsets;
          import java.util.Arrays;
          import java.util.Locale;

          /**
           * Ntag424Plugin — NTAG 424 DNA NFC Scanner
           *
           * Liest den NDEF-Text-Record vom Chip.
           * Format des Text-Records: "<sats>;<status>"
           *   Beispiel: "2.100;valid"  (Punkt = Tausender-Trenner, wird beim Parsen entfernt)
           *   Beispiel: "11.000;invalid"
           *   Beispiel: "13.500;entwertenbeantragt"
           *
           * tagRead event payload:
           *   uid         : String  — Chip-UID (hex, uppercase, no colons)
           *   chipStatus  : String  — "valid" / "invalid" / "entwertenbeantragt"
           *   chipSats    : int     — Sats aus NDEF-Text-Record (0 wenn kein Record)
           *   ndefText    : String  — Roher NDEF-Text-Inhalt (z.B. "2.100;valid")
           *   debug       : String  — Dump-Log aller Operationen
           *
           * Schreiben (writeStatus):
           *   Liest aktuellen NDEF-Text, ersetzt den Status-Teil, schreibt zurück.
           *   Format bleibt gleich: "<sats>;<neuerStatus>"
           */
          @CapacitorPlugin(name = "Ntag424")
          public class Ntag424Plugin extends Plugin {
              private static final String TAG = "Ntag424Plugin";
              private boolean scanning = false;
              private PluginCall pendingWriteCall = null;
              private PluginCall pendingReadCall  = null;

              @PluginMethod
              public void startScan(PluginCall call) {
                  android.nfc.NfcAdapter a = android.nfc.NfcAdapter.getDefaultAdapter(getContext());
                  if (a == null || !a.isEnabled()) { call.reject("NFC nicht verfuegbar"); return; }
                  scanning = true;
                  call.resolve();
              }

              @PluginMethod
              public void stopScan(PluginCall call) {
                  scanning = false;
                  call.resolve();
              }

              @PluginMethod
              public void writeStatus(PluginCall call) {
                  pendingWriteCall = call;
                  call.setKeepAlive(true);
              }

              @PluginMethod
              public void readStatus(PluginCall call) {
                  pendingReadCall = call;
                  call.setKeepAlive(true);
              }

              public void handleTag(Tag tag) {
                  String uid = toHex(tag.getId()).toUpperCase();
                  Log.i(TAG, "handleTag uid=" + uid);

                  if (pendingWriteCall != null) {
                      final PluginCall c = pendingWriteCall; pendingWriteCall = null;
                      new Thread(() -> doWrite(tag, uid, c)).start();
                      return;
                  }
                  if (pendingReadCall != null) {
                      final PluginCall c = pendingReadCall; pendingReadCall = null;
                      new Thread(() -> doReadForCall(tag, uid, c)).start();
                      return;
                  }
                  if (!scanning) return;
                  new Thread(() -> doFullScan(tag, uid)).start();
              }

              // ── Full scan: reads NDEF Text Record ────────────────────────────────
              private void doFullScan(Tag tag, String uid) {
                  StringBuilder dump = new StringBuilder();
                  dump.append("=== SCAN ").append(uid).append(" ===\n");

                  NdefContent content = readNdef(tag, dump);
                  dump.append("=== RESULT: text='").append(content.rawText)
                      .append("' sats=").append(content.sats)
                      .append(" status=").append(content.status).append(" ===\n");

                  Log.i(TAG, dump.toString());
                  emitResult(uid, content.status, content.sats, content.rawText, dump.toString());
              }

              // ── Read NDEF for readStatus() call ──────────────────────────────────
              private void doReadForCall(Tag tag, String uid, PluginCall call) {
                  StringBuilder dump = new StringBuilder();
                  dump.append("=== READ STATUS ").append(uid).append(" ===\n");
                  NdefContent content = readNdef(tag, dump);
                  JSObject r = new JSObject();
                  r.put("success", true);
                  r.put("status", content.status);
                  r.put("sats", content.sats);
                  r.put("ndefText", content.rawText);
                  r.put("dump", dump.toString());
                  call.resolve(r);
              }

              // ── Write NDEF: update only the status part ───────────────────────────
              private void doWrite(Tag tag, String uid, PluginCall call) {
                  StringBuilder dump = new StringBuilder();
                  dump.append("=== WRITE STATUS ").append(uid).append(" ===\n");
                  try {
                      String newStatus = call.getString("status", "valid");
                      dump.append("Target status: ").append(newStatus).append("\n");

                      // First: read current NDEF to get current sats
                      NdefContent current = readNdef(tag, dump);
                      dump.append("Current: text='").append(current.rawText)
                          .append("' sats=").append(current.sats)
                          .append(" status=").append(current.status).append("\n");

                      // Build new text: keep sats, replace status
                      // If current text has sats, format: "sats;newStatus"
                      // If no text yet, use sats from call param or 0
                      String satsStr = current.satsString.isEmpty() ? "0" : current.satsString;
                      String newText = satsStr + ";" + newStatus;
                      dump.append("New NDEF text: '").append(newText).append("'\n");

                      // Write NDEF
                      Ndef ndef = Ndef.get(tag);
                      if (ndef == null) {
                          resolveWriteError(call, "NO_NDEF", "Chip unterstuetzt kein NDEF\n" + dump);
                          return;
                      }

                      ndef.connect();
                      try {
                          if (!ndef.isWritable()) {
                              resolveWriteError(call, "READ_ONLY", "Chip ist schreibgeschuetzt\n" + dump);
                              return;
                          }

                          NdefRecord textRecord = createTextRecord("de", newText);
                          // Also keep the URL record if it existed
                          NdefMessage newMsg;
                          if (current.urlRecord != null) {
                              newMsg = new NdefMessage(new NdefRecord[]{ current.urlRecord, textRecord });
                          } else {
                              newMsg = new NdefMessage(new NdefRecord[]{ textRecord });
                          }

                          int msgSize = newMsg.toByteArray().length;
                          dump.append("Writing NDEF message ").append(msgSize).append(" bytes\n");

                          ndef.writeNdefMessage(newMsg);
                          dump.append("Write OK\n");
                      } finally {
                          try { ndef.close(); } catch (Exception ignored) {}
                      }

                      // Verify: read back
                      NdefContent verify = readNdef(tag, dump);
                      dump.append("Verify: status=").append(verify.status).append(" text='").append(verify.rawText).append("'\n");

                      JSObject r = new JSObject();
                      r.put("success", true);
                      r.put("statusWritten", newStatus);
                      r.put("statusVerified", verify.status);
                      r.put("ndefText", verify.rawText);
                      r.put("dump", dump.toString());
                      call.resolve(r);

                  } catch (Exception e) {
                      dump.append("EXCEPTION: ").append(e.getMessage()).append("\n");
                      resolveWriteError(call, "EXCEPTION", e.getMessage() + "\n" + dump);
                  }
              }

              // ── Read NDEF text record ─────────────────────────────────────────────
              private NdefContent readNdef(Tag tag, StringBuilder dump) {
                  NdefContent result = new NdefContent();
                  try {
                      Ndef ndef = Ndef.get(tag);
                      if (ndef == null) {
                          dump.append("NDEF: not available on this tag\n");
                          return result;
                      }
                      ndef.connect();
                      try {
                          NdefMessage msg = ndef.getNdefMessage();
                          if (msg == null) {
                              msg = ndef.getCachedNdefMessage();
                          }
                          if (msg == null) {
                              dump.append("NDEF: no message on chip\n");
                              return result;
                          }
                          NdefRecord[] records = msg.getRecords();
                          dump.append("NDEF: ").append(records.length).append(" record(s)\n");

                          for (int i = 0; i < records.length; i++) {
                              NdefRecord rec = records[i];
                              dump.append("  Record[").append(i).append("]: TNF=")
                                  .append(rec.getTnf()).append(" type=")
                                  .append(new String(rec.getType())).append("\n");

                              if (rec.getTnf() == NdefRecord.TNF_WELL_KNOWN &&
                                  Arrays.equals(rec.getType(), NdefRecord.RTD_URI)) {
                                  result.urlRecord = rec;
                                  dump.append("  -> URL record preserved\n");
                              }

                              if (rec.getTnf() == NdefRecord.TNF_WELL_KNOWN &&
                                  Arrays.equals(rec.getType(), NdefRecord.RTD_TEXT)) {
                                  String text = parseTextRecord(rec);
                                  dump.append("  -> TEXT: '").append(text).append("'\n");
                                  result.rawText = text;
                                  parseChipText(text, result);
                              }
                          }
                      } finally {
                          try { ndef.close(); } catch (Exception ignored) {}
                      }
                  } catch (Exception e) {
                      dump.append("NDEF ERR: ").append(e.getMessage()).append("\n");
                  }
                  return result;
              }

              /**
               * Parses NDEF text record payload.
               * Format: [status byte][lang bytes][text bytes]
               * Status byte: bit7=encoding (0=UTF-8,1=UTF-16), bits5-0=lang length
               */
              private String parseTextRecord(NdefRecord record) {
                  try {
                      byte[] payload = record.getPayload();
                      if (payload == null || payload.length == 0) return "";
                      int statusByte = payload[0] & 0xFF;
                      int langLen = statusByte & 0x3F;
                      boolean utf16 = (statusByte & 0x80) != 0;
                      if (1 + langLen > payload.length) return "";
                      String charset = utf16 ? "UTF-16" : "UTF-8";
                      return new String(payload, 1 + langLen, payload.length - 1 - langLen,
                          java.nio.charset.Charset.forName(charset));
                  } catch (Exception e) {
                      return "";
                  }
              }

              /**
               * Parses chip text format: "sats;status"
               * sats may have dots as thousand separators: "2.100" → 2100
               * Also handles plain "status" without sats (legacy).
               */
              private void parseChipText(String text, NdefContent result) {
                  if (text == null || text.isEmpty()) return;
                  String t = text.trim();
                  if (t.contains(";")) {
                      String[] parts = t.split(";", 2);
                      result.satsString = parts[0].trim();
                      String statusRaw = parts[1].trim().toLowerCase(Locale.ROOT);
                      // Parse sats: remove dots (thousand separators) and parse
                      try {
                          String satsClean = result.satsString.replace(".", "").replace(",", "");
                          result.sats = Integer.parseInt(satsClean);
                      } catch (NumberFormatException e) {
                          result.sats = 0;
                      }
                      result.status = normalizeStatus(statusRaw);
                  } else {
                      // Legacy: plain status string without sats
                      result.status = normalizeStatus(t.toLowerCase(Locale.ROOT));
                  }
              }

              private String normalizeStatus(String s) {
                  if ("invalid".equals(s) || "entwertenbeantragt".equals(s)) return s;
                  return "valid";
              }

              /**
               * Creates an NDEF Text record.
               * @param lang  ISO 639 language code, e.g. "de"
               * @param text  The text content
               */
              private NdefRecord createTextRecord(String lang, String text) {
                  byte[] langBytes = lang.getBytes(StandardCharsets.US_ASCII);
                  byte[] textBytes = text.getBytes(StandardCharsets.UTF_8);
                  byte[] payload = new byte[1 + langBytes.length + textBytes.length];
                  payload[0] = (byte) (langBytes.length & 0x3F); // UTF-8, langLen
                  System.arraycopy(langBytes, 0, payload, 1, langBytes.length);
                  System.arraycopy(textBytes, 0, payload, 1 + langBytes.length, textBytes.length);
                  return new NdefRecord(NdefRecord.TNF_WELL_KNOWN, NdefRecord.RTD_TEXT, new byte[0], payload);
              }

              private static String toHex(byte[] b) {
                  if (b == null) return "null";
                  StringBuilder sb = new StringBuilder();
                  for (byte x : b) sb.append(String.format("%02X", x));
                  return sb.toString();
              }

              private void emitResult(String uid, String chipStatus, int chipSats, String ndefText, String dump) {
                  JSObject r = new JSObject();
                  r.put("uid", uid);
                  r.put("chipStatus", chipStatus);
                  r.put("chipSats", chipSats);
                  r.put("ndefText", ndefText);
                  r.put("debug", dump);
                  notifyListeners("tagRead", r);
                  Log.i(TAG, "EMIT uid=" + uid + " status=" + chipStatus + " sats=" + chipSats + " text='" + ndefText + "'");
              }

              private void resolveWriteError(PluginCall call, String code, String msg) {
                  JSObject r = new JSObject();
                  r.put("success", false);
                  r.put("errorCode", code);
                  r.put("errorMessage", msg);
                  call.resolve(r);
              }

              // ── Inner class for NDEF read result ─────────────────────────────────
              private static class NdefContent {
                  String rawText   = "";
                  String status    = "valid";
                  int sats         = 0;
                  String satsString = "";
                  NdefRecord urlRecord = null;
              }
          }
          JAVAEOF

      - name: Patch AndroidManifest.xml for NFC
        run: |
          MANIFEST=android/app/src/main/AndroidManifest.xml
          sed -i '/<manifest /a\    <uses-permission android:name="android.permission.NFC" />\n    <uses-feature android:name="android.hardware.nfc" android:required="true" />' "$MANIFEST"
          sed -i 's|</activity>|        <intent-filter>\n                <action android:name="android.nfc.action.TECH_DISCOVERED" />\n            </intent-filter>\n            <meta-data android:name="android.nfc.action.TECH_DISCOVERED" android:resource="@xml/nfc_tech_filter" />\n        </activity>|' "$MANIFEST"

      - name: Write nfc_tech_filter.xml
        run: |
          mkdir -p android/app/src/main/res/xml
          cat > android/app/src/main/res/xml/nfc_tech_filter.xml << 'XMLEOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <tech-list><tech>android.nfc.tech.Ndef</tech></tech-list>
              <tech-list><tech>android.nfc.tech.NdefFormatable</tech></tech-list>
              <tech-list><tech>android.nfc.tech.IsoDep</tech></tech-list>
              <tech-list><tech>android.nfc.tech.NfcA</tech></tech-list>
          </resources>
          XMLEOF

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK components
        run: |
          sdkmanager "platform-tools" "platforms;android-34" "build-tools;34.0.0"

      - name: Accept Android SDK licenses
        run: yes | sdkmanager --licenses || true

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build debug APK
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: ntag424-scanner-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Build summary
        run: |
          echo "## APK gebaut!" >> $GITHUB_STEP_SUMMARY
          echo "Download: **Artifacts → ntag424-scanner-debug**" >> $GITHUB_STEP_SUMMARY
