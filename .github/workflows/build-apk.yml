name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest
    timeout-minutes: 40

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Capacitor CLI globally
        run: npm install -g @capacitor/cli

      - name: Install project dependencies
        run: npm install
        env:
          NODE_ENV: development

      - name: Generate chipRegistry.ts from chips.json
        run: node scripts/generate-registry.cjs

      - name: Build web app
        run: npx vite build

      - name: Add Capacitor Android platform
        run: cap add android

      - name: Sync Capacitor
        run: cap sync android

      - name: Write MainActivity.java with NFC support
        run: |
          cat > android/app/src/main/java/com/ntag424scanner/app/MainActivity.java << 'JAVAEOF'
          package com.ntag424scanner.app;
          import android.app.PendingIntent;
          import android.content.Intent;
          import android.nfc.NfcAdapter;
          import android.nfc.Tag;
          import android.os.Bundle;
          import com.getcapacitor.BridgeActivity;
          public class MainActivity extends BridgeActivity {
              private Ntag424Plugin nfcPlugin;
              private NfcAdapter nfcAdapter;
              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  registerPlugin(Ntag424Plugin.class);
                  super.onCreate(savedInstanceState);
                  nfcAdapter = NfcAdapter.getDefaultAdapter(this);
                  nfcPlugin = (Ntag424Plugin) getBridge().getPlugin("Ntag424").getInstance();
              }
              @Override
              public void onResume() {
                  super.onResume();
                  if (nfcAdapter != null && nfcAdapter.isEnabled()) {
                      PendingIntent pendingIntent = PendingIntent.getActivity(
                          this, 0,
                          new Intent(this, getClass()).addFlags(Intent.FLAG_ACTIVITY_SINGLE_TOP),
                          PendingIntent.FLAG_MUTABLE);
                      nfcAdapter.enableForegroundDispatch(this, pendingIntent, null, null);
                  }
              }
              @Override
              public void onPause() {
                  super.onPause();
                  if (nfcAdapter != null) nfcAdapter.disableForegroundDispatch(this);
              }
              @Override
              public void onNewIntent(Intent intent) {
                  super.onNewIntent(intent);
                  Tag tag = intent.getParcelableExtra(NfcAdapter.EXTRA_TAG);
                  if (tag != null && nfcPlugin != null) nfcPlugin.handleTag(tag);
              }
          }
          JAVAEOF

      - name: Write Ntag424Plugin.java
        run: |
          cat > android/app/src/main/java/com/ntag424scanner/app/Ntag424Plugin.java << 'JAVAEOF'
          package com.ntag424scanner.app;
          import android.nfc.Tag;
          import android.nfc.tech.IsoDep;
          import android.util.Log;
          import com.getcapacitor.JSObject;
          import com.getcapacitor.Plugin;
          import com.getcapacitor.PluginCall;
          import com.getcapacitor.PluginMethod;
          import com.getcapacitor.annotation.CapacitorPlugin;
          import java.nio.charset.StandardCharsets;
          import java.util.Arrays;

          /**
           * Ntag424Plugin — NTAG 424 DNA NFC Scanner + Status-Writer
           *
           * tagRead event payload:
           *   uid         : String  — Chip-UID (hex, uppercase, no colons)
           *   chipStatus  : String  — Status aus File 02 ("valid" / "invalid" / "entwertenbeantragt")
           *   chipSats    : int     — Sats aus File 03 (raw int, 0 wenn nicht geschrieben)
           *   debug       : String  — APDU dump log (alle Befehle + Antworten)
           *
           * Methods:
           *   startScan()   — beginnt NFC-Scan-Modus
           *   stopScan()    — beendet Scan-Modus
           *   writeStatus() — schreibt Status-String in File 02
           *   readStatus()  — liest Status-String aus File 02
           */
          @CapacitorPlugin(name = "Ntag424")
          public class Ntag424Plugin extends Plugin {
              private static final String TAG = "Ntag424Plugin";
              private boolean scanning = false;
              private PluginCall pendingWriteCall = null;
              private PluginCall pendingReadCall  = null;

              private static final byte[] DF_NAME = {
                  (byte)0xD2,(byte)0x76,(byte)0x00,(byte)0x00,(byte)0x85,(byte)0x01,(byte)0x01
              };

              @PluginMethod
              public void startScan(PluginCall call) {
                  android.nfc.NfcAdapter a = android.nfc.NfcAdapter.getDefaultAdapter(getContext());
                  if (a == null || !a.isEnabled()) { call.reject("NFC nicht verfuegbar"); return; }
                  scanning = true;
                  call.resolve();
              }

              @PluginMethod
              public void stopScan(PluginCall call) {
                  scanning = false;
                  call.resolve();
              }

              @PluginMethod
              public void writeStatus(PluginCall call) {
                  pendingWriteCall = call;
                  call.setKeepAlive(true);
              }

              @PluginMethod
              public void readStatus(PluginCall call) {
                  pendingReadCall = call;
                  call.setKeepAlive(true);
              }

              public void handleTag(Tag tag) {
                  String uid = toHex(tag.getId()).toUpperCase();
                  IsoDep iso = IsoDep.get(tag);
                  if (iso == null) {
                      emitResult(uid, "UNKNOWN", 0, "NO_ISODEP");
                      return;
                  }

                  if (pendingWriteCall != null) {
                      final PluginCall c = pendingWriteCall; pendingWriteCall = null;
                      new Thread(() -> doWrite(iso, uid, c)).start();
                      return;
                  }
                  if (pendingReadCall != null) {
                      final PluginCall c = pendingReadCall; pendingReadCall = null;
                      new Thread(() -> doRead(iso, uid, c)).start();
                      return;
                  }
                  if (!scanning) return;
                  new Thread(() -> doFullScan(iso, uid)).start();
              }

              // ── Full scan: reads Status (File 02) + Sats (File 03) ────────────
              private void doFullScan(IsoDep iso, String uid) {
                  StringBuilder dump = new StringBuilder();
                  dump.append("=== SCAN ").append(uid).append(" ===\n");
                  try {
                      iso.connect();
                      iso.setTimeout(8000);

                      // 1. SELECT Application
                      if (!selectApp(iso, uid, dump)) {
                          emitResult(uid, "valid", 0, dump.toString());
                          return;
                      }

                      // 2. Read File 02 — Status string
                      String chipStatus = readFile02(iso, uid, dump);

                      // 3. Read File 03 — Sats (4-byte big-endian int)
                      int chipSats = readFile03(iso, uid, dump);

                      dump.append("=== RESULT status=").append(chipStatus)
                          .append(" sats=").append(chipSats).append(" ===\n");

                      Log.i(TAG, dump.toString());
                      emitResult(uid, chipStatus, chipSats, dump.toString());

                  } catch (Exception e) {
                      dump.append("EXCEPTION: ").append(e.getMessage()).append("\n");
                      Log.e(TAG, dump.toString());
                      emitResult(uid, "valid", 0, dump.toString());
                  } finally {
                      try { iso.close(); } catch (Exception ignored) {}
                  }
              }

              // ── Read File 02 (Status string, 32 bytes) ────────────────────────
              private String readFile02(IsoDep iso, String uid, StringBuilder dump) {
                  try {
                      // ReadData: CLA=90 INS=AD P1=00 P2=00 Lc=07 [FileNo=02 Offset=000000 Len=200000] Le=00
                      byte[] cmd = { (byte)0x90,(byte)0xAD,0x00,0x00,0x07, 0x02,0x00,0x00,0x00,0x20,0x00,0x00,0x00 };
                      dump.append("ReadFile02 CMD: ").append(toHex(cmd)).append("\n");
                      byte[] resp = iso.transceive(cmd);
                      dump.append("ReadFile02 RSP: ").append(toHex(resp)).append("\n");
                      if (resp == null || resp.length < 2) return "valid";
                      int sw1 = resp[resp.length-2]&0xFF, sw2 = resp[resp.length-1]&0xFF;
                      if (sw1==0x91 && sw2==0x00) {
                          byte[] data = Arrays.copyOf(resp, resp.length-2);
                          int len = data.length;
                          while (len>0 && data[len-1]==0) len--;
                          String s = new String(data, 0, len, StandardCharsets.UTF_8).trim().toLowerCase();
                          if (s.equals("invalid") || s.equals("entwertenbeantragt")) return s;
                          return "valid";
                      }
                      dump.append("ReadFile02: SW=").append(String.format("%02X%02X",sw1,sw2)).append(" (no status written yet)\n");
                      return "valid";
                  } catch (Exception e) {
                      dump.append("ReadFile02 ERR: ").append(e.getMessage()).append("\n");
                      return "valid";
                  }
              }

              // ── Read File 03 (Sats, 4-byte big-endian) ────────────────────────
              private int readFile03(IsoDep iso, String uid, StringBuilder dump) {
                  try {
                      // ReadData: CLA=90 INS=AD P1=00 P2=00 Lc=07 [FileNo=03 Offset=000000 Len=040000] Le=00
                      byte[] cmd = { (byte)0x90,(byte)0xAD,0x00,0x00,0x07, 0x03,0x00,0x00,0x00,0x04,0x00,0x00,0x00 };
                      dump.append("ReadFile03 CMD: ").append(toHex(cmd)).append("\n");
                      byte[] resp = iso.transceive(cmd);
                      dump.append("ReadFile03 RSP: ").append(toHex(resp)).append("\n");
                      if (resp == null || resp.length < 6) return 0;
                      int sw1 = resp[resp.length-2]&0xFF, sw2 = resp[resp.length-1]&0xFF;
                      if (sw1==0x91 && sw2==0x00 && resp.length >= 6) {
                          int sats = ((resp[0]&0xFF)<<24)|((resp[1]&0xFF)<<16)|((resp[2]&0xFF)<<8)|(resp[3]&0xFF);
                          return sats;
                      }
                      return 0;
                  } catch (Exception e) {
                      dump.append("ReadFile03 ERR: ").append(e.getMessage()).append("\n");
                      return 0;
                  }
              }

              // ── Write File 02 (Status) ────────────────────────────────────────
              private void doWrite(IsoDep iso, String uid, PluginCall call) {
                  StringBuilder dump = new StringBuilder();
                  dump.append("=== WRITE STATUS ").append(uid).append(" ===\n");
                  try {
                      iso.connect(); iso.setTimeout(10000);
                      String statusToWrite = call.getString("status", "valid");
                      dump.append("Writing status: ").append(statusToWrite).append("\n");
                      byte[] statusBytes = statusToWrite.getBytes(StandardCharsets.UTF_8);
                      if (statusBytes.length > 32) statusBytes = Arrays.copyOf(statusBytes, 32);
                      byte[] payload = new byte[32];
                      System.arraycopy(statusBytes, 0, payload, 0, statusBytes.length);

                      if (!selectApp(iso, uid, dump)) {
                          resolveWriteError(call, "SELECT_FAILED", "App-Selektion fehlgeschlagen\n"+dump); return;
                      }

                      // WriteData File 02
                      byte[] writeCmd = new byte[13 + 32];
                      writeCmd[0]=(byte)0x90; writeCmd[1]=(byte)0x8D;
                      writeCmd[2]=0x00; writeCmd[3]=0x00; writeCmd[4]=(byte)(7+32);
                      writeCmd[5]=0x02; writeCmd[6]=0x00; writeCmd[7]=0x00; writeCmd[8]=0x00;
                      writeCmd[9]=(byte)32; writeCmd[10]=0x00; writeCmd[11]=0x00;
                      System.arraycopy(payload, 0, writeCmd, 12, 32);
                      writeCmd[44]=0x00;
                      dump.append("WriteFile02 CMD: ").append(toHex(writeCmd)).append("\n");
                      byte[] wr = iso.transceive(writeCmd);
                      dump.append("WriteFile02 RSP: ").append(toHex(wr)).append("\n");

                      if (isNative9100(wr)) {
                          JSObject r = new JSObject();
                          r.put("success", true); r.put("dump", dump.toString());
                          call.resolve(r);
                      } else {
                          resolveWriteError(call, "WRITE_FAILED", "SW="+toHex(wr)+"\n"+dump);
                      }
                  } catch (Exception e) {
                      resolveWriteError(call, "EXCEPTION", e.getMessage()+"\n"+dump);
                  } finally {
                      try { iso.close(); } catch (Exception ignored) {}
                  }
              }

              // ── Read File 02 via readStatus call ──────────────────────────────
              private void doRead(IsoDep iso, String uid, PluginCall call) {
                  StringBuilder dump = new StringBuilder();
                  dump.append("=== READ STATUS ").append(uid).append(" ===\n");
                  try {
                      iso.connect(); iso.setTimeout(5000);
                      if (!selectApp(iso, uid, dump)) {
                          resolveReadError(call, "SELECT_FAILED", "App-Selektion fehlgeschlagen\n"+dump); return;
                      }
                      String status = readFile02(iso, uid, dump);
                      JSObject r = new JSObject();
                      r.put("success", true); r.put("status", status); r.put("dump", dump.toString());
                      call.resolve(r);
                  } catch (Exception e) {
                      resolveReadError(call, "EXCEPTION", e.getMessage()+"\n"+dump);
                  } finally {
                      try { iso.close(); } catch (Exception ignored) {}
                  }
              }

              // ── Helpers ───────────────────────────────────────────────────────
              private boolean selectApp(IsoDep iso, String uid, StringBuilder dump) throws Exception {
                  byte[] cmd = new byte[5+DF_NAME.length+1];
                  cmd[0]=0x00; cmd[1]=(byte)0xA4; cmd[2]=0x04; cmd[3]=0x00; cmd[4]=(byte)DF_NAME.length;
                  System.arraycopy(DF_NAME,0,cmd,5,DF_NAME.length); cmd[cmd.length-1]=0x00;
                  dump.append("SelectApp CMD: ").append(toHex(cmd)).append("\n");
                  byte[] resp = iso.transceive(cmd);
                  dump.append("SelectApp RSP: ").append(toHex(resp)).append("\n");
                  return resp!=null && resp.length>=2 && resp[resp.length-2]==(byte)0x90 && resp[resp.length-1]==(byte)0x00;
              }

              private static String toHex(byte[] b) {
                  if (b==null) return "null";
                  StringBuilder sb=new StringBuilder();
                  for (byte x:b) sb.append(String.format("%02X",x));
                  return sb.toString();
              }
              private boolean isNative9100(byte[] r) {
                  return r!=null && r.length>=2 && r[r.length-2]==(byte)0x91 && r[r.length-1]==(byte)0x00;
              }
              private void emitResult(String uid, String chipStatus, int chipSats, String dump) {
                  JSObject r = new JSObject();
                  r.put("uid", uid);
                  r.put("chipStatus", chipStatus);
                  r.put("chipSats", chipSats);
                  r.put("debug", dump);
                  notifyListeners("tagRead", r);
                  Log.i(TAG, "EMIT uid="+uid+" status="+chipStatus+" sats="+chipSats);
              }
              private void resolveWriteError(PluginCall call, String code, String msg) {
                  JSObject r=new JSObject(); r.put("success",false); r.put("errorCode",code); r.put("errorMessage",msg); call.resolve(r);
              }
              private void resolveReadError(PluginCall call, String code, String msg) {
                  JSObject r=new JSObject(); r.put("success",false); r.put("errorCode",code); r.put("errorMessage",msg); call.resolve(r);
              }
          }
          JAVAEOF

      - name: Patch AndroidManifest.xml for NFC
        run: |
          MANIFEST=android/app/src/main/AndroidManifest.xml
          sed -i '/<manifest /a\    <uses-permission android:name="android.permission.NFC" />\n    <uses-feature android:name="android.hardware.nfc" android:required="true" />' "$MANIFEST"
          sed -i 's|</activity>|        <intent-filter>\n                <action android:name="android.nfc.action.TECH_DISCOVERED" />\n            </intent-filter>\n            <meta-data android:name="android.nfc.action.TECH_DISCOVERED" android:resource="@xml/nfc_tech_filter" />\n        </activity>|' "$MANIFEST"

      - name: Write nfc_tech_filter.xml
        run: |
          mkdir -p android/app/src/main/res/xml
          cat > android/app/src/main/res/xml/nfc_tech_filter.xml << 'XMLEOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <tech-list><tech>android.nfc.tech.IsoDep</tech></tech-list>
              <tech-list><tech>android.nfc.tech.NfcA</tech></tech-list>
          </resources>
          XMLEOF

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK components
        run: |
          sdkmanager "platform-tools" "platforms;android-34" "build-tools;34.0.0"

      - name: Accept Android SDK licenses
        run: yes | sdkmanager --licenses || true

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build debug APK
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: ntag424-scanner-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Build summary
        run: |
          echo "## APK gebaut!" >> $GITHUB_STEP_SUMMARY
          echo "Download: **Artifacts → ntag424-scanner-debug**" >> $GITHUB_STEP_SUMMARY
