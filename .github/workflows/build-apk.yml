name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest
    timeout-minutes: 40

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Capacitor CLI globally
        run: npm install -g @capacitor/cli

      - name: Install project dependencies
        run: npm install
        env:
          NODE_ENV: development

      - name: Generate chipRegistry.ts from chips.json
        run: node scripts/generate-registry.cjs

      - name: Build web app
        run: npx vite build

      - name: Add Capacitor Android platform
        run: cap add android

      - name: Sync Capacitor
        run: cap sync android

      - name: Write MainActivity.java with NFC support
        run: |
          cat > android/app/src/main/java/com/ntag424scanner/app/MainActivity.java << 'JAVAEOF'
          package com.ntag424scanner.app;
          import android.app.PendingIntent;
          import android.content.Intent;
          import android.nfc.NfcAdapter;
          import android.nfc.Tag;
          import android.os.Bundle;
          import com.getcapacitor.BridgeActivity;
          public class MainActivity extends BridgeActivity {
              private Ntag424Plugin nfcPlugin;
              private NfcAdapter nfcAdapter;
              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  registerPlugin(Ntag424Plugin.class);
                  super.onCreate(savedInstanceState);
                  nfcAdapter = NfcAdapter.getDefaultAdapter(this);
                  nfcPlugin = (Ntag424Plugin) getBridge().getPlugin("Ntag424").getInstance();
              }
              @Override
              public void onResume() {
                  super.onResume();
                  if (nfcAdapter != null && nfcAdapter.isEnabled()) {
                      PendingIntent pendingIntent = PendingIntent.getActivity(
                          this, 0,
                          new Intent(this, getClass()).addFlags(Intent.FLAG_ACTIVITY_SINGLE_TOP),
                          PendingIntent.FLAG_MUTABLE);
                      nfcAdapter.enableForegroundDispatch(this, pendingIntent, null, null);
                  }
              }
              @Override
              public void onPause() {
                  super.onPause();
                  if (nfcAdapter != null) nfcAdapter.disableForegroundDispatch(this);
              }
              @Override
              public void onNewIntent(Intent intent) {
                  super.onNewIntent(intent);
                  Tag tag = intent.getParcelableExtra(NfcAdapter.EXTRA_TAG);
                  if (tag != null && nfcPlugin != null) nfcPlugin.handleTag(tag);
              }
          }
          JAVAEOF

      - name: Write Ntag424Plugin.java
        run: |
          cat > android/app/src/main/java/com/ntag424scanner/app/Ntag424Plugin.java << 'JAVAEOF'
          package com.ntag424scanner.app;
          import android.nfc.Tag;
          import android.nfc.tech.IsoDep;
          import android.util.Log;
          import com.getcapacitor.JSObject;
          import com.getcapacitor.Plugin;
          import com.getcapacitor.PluginCall;
          import com.getcapacitor.PluginMethod;
          import com.getcapacitor.annotation.CapacitorPlugin;
          import java.nio.charset.StandardCharsets;
          import java.util.Arrays;

          @CapacitorPlugin(name = "Ntag424")
          public class Ntag424Plugin extends Plugin {
              private static final String TAG = "Ntag424Plugin";
              private boolean scanning = false;
              private Tag pendingWriteTag = null;
              private PluginCall pendingWriteCall = null;
              private PluginCall pendingReadCall  = null;

              private static final byte[] DF_NAME = {
                  (byte)0xD2,(byte)0x76,(byte)0x00,(byte)0x00,(byte)0x85,(byte)0x01,(byte)0x01
              };

              // ── startScan ──────────────────────────────────────────────────
              @PluginMethod
              public void startScan(PluginCall call) {
                  android.nfc.NfcAdapter a = android.nfc.NfcAdapter.getDefaultAdapter(getContext());
                  if (a == null || !a.isEnabled()) { call.reject("NFC nicht verfuegbar"); return; }
                  scanning = true;
                  call.resolve();
              }

              @PluginMethod
              public void stopScan(PluginCall call) {
                  scanning = false;
                  call.resolve();
              }

              // ── writeStatus ───────────────────────────────────────────────
              // Called from JS when user should tap chip. Waits for next handleTag().
              @PluginMethod
              public void writeStatus(PluginCall call) {
                  pendingWriteCall = call;
                  call.setKeepAlive(true);
                  // actual write happens in handleTag()
              }

              // ── readStatus ────────────────────────────────────────────────
              @PluginMethod
              public void readStatus(PluginCall call) {
                  pendingReadCall = call;
                  call.setKeepAlive(true);
              }

              // ── handleTag (called from MainActivity.onNewIntent) ──────────
              public void handleTag(Tag tag) {
                  String uid = toHex(tag.getId()).toUpperCase();
                  IsoDep iso = IsoDep.get(tag);
                  if (iso == null) {
                      emitResult(uid, "UNKNOWN", "NO_ISODEP");
                      return;
                  }

                  // Handle pending write
                  if (pendingWriteCall != null) {
                      final PluginCall wCall = pendingWriteCall;
                      pendingWriteCall = null;
                      new Thread(() -> doWrite(tag, iso, uid, wCall)).start();
                      return;
                  }

                  // Handle pending read
                  if (pendingReadCall != null) {
                      final PluginCall rCall = pendingReadCall;
                      pendingReadCall = null;
                      new Thread(() -> doRead(iso, uid, rCall)).start();
                      return;
                  }

                  // Normal scan
                  if (!scanning) return;
                  new Thread(() -> {
                      try {
                          iso.connect();
                          iso.setTimeout(5000);
                          String tamperStatus = readTamperStatus(iso, uid);
                          emitResult(uid, tamperStatus, "OK");
                      } catch (Exception e) {
                          emitResult(uid, "UNKNOWN", "ERR:" + e.getMessage());
                      } finally {
                          try { iso.close(); } catch (Exception ignored) {}
                      }
                  }).start();
              }

              // ── doWrite: schreibt Status-String in NDEF File 2 ────────────
              // NTAG 424 mit allen Keys = 00..00 (unset/default)
              // File 2 = Standard Data File, FileNo=02, max 256 bytes
              // Write via ISO 7816 Write Data command (0x8D)
              private void doWrite(Tag tag, IsoDep iso, String uid, PluginCall call) {
                  try {
                      iso.connect();
                      iso.setTimeout(10000);

                      String statusToWrite = call.getString("status", "valid");
                      // Pad/truncate to 32 bytes
                      byte[] statusBytes = statusToWrite.getBytes(StandardCharsets.UTF_8);
                      if (statusBytes.length > 32) statusBytes = Arrays.copyOf(statusBytes, 32);
                      byte[] payload = new byte[32];
                      System.arraycopy(statusBytes, 0, payload, 0, statusBytes.length);

                      // 1. SELECT Application
                      if (!selectApp(iso, uid)) {
                          resolveWriteError(call, "SELECT_FAILED", "App-Selektion fehlgeschlagen");
                          return;
                      }

                      // 2. WriteData to File 02, offset 0x000000, length 32
                      // CLA=90 INS=8D P1=00 P2=00 Lc=07+32 [FileNo=02 Offset(3) Len(3) Data(32)]
                      byte[] writeCmd = new byte[7 + 32 + 1];
                      writeCmd[0] = (byte)0x90; writeCmd[1] = (byte)0x8D;
                      writeCmd[2] = 0x00;       writeCmd[3] = 0x00;
                      writeCmd[4] = (byte)(7 + 32); // Lc
                      writeCmd[5] = 0x02;        // FileNo = 02
                      writeCmd[6] = 0x00; writeCmd[7] = 0x00; writeCmd[8] = 0x00; // Offset
                      writeCmd[9] = (byte)32; writeCmd[10] = 0x00; writeCmd[11] = 0x00; // Length
                      System.arraycopy(payload, 0, writeCmd, 12, 32);
                      writeCmd[writeCmd.length - 1] = 0x00; // Le

                      byte[] writeResp = iso.transceive(writeCmd);
                      Log.i(TAG, uid + " WRITE resp=" + toHex(writeResp));

                      if (isNative9100(writeResp)) {
                          JSObject r = new JSObject();
                          r.put("success", true);
                          call.resolve(r);
                      } else {
                          resolveWriteError(call, "WRITE_FAILED", "SW=" + toHex(writeResp));
                      }
                  } catch (Exception e) {
                      resolveWriteError(call, "EXCEPTION", e.getMessage());
                  } finally {
                      try { iso.close(); } catch (Exception ignored) {}
                  }
              }

              // ── doRead: liest Status-String aus File 2 ────────────────────
              private void doRead(IsoDep iso, String uid, PluginCall call) {
                  try {
                      iso.connect();
                      iso.setTimeout(5000);

                      if (!selectApp(iso, uid)) {
                          resolveReadError(call, "SELECT_FAILED", "App-Selektion fehlgeschlagen");
                          return;
                      }

                      // ReadData from File 02, offset 0, length 32
                      // CLA=90 INS=AD P1=00 P2=00 Lc=07 [FileNo Offset(3) Len(3)] Le=00
                      byte[] readCmd = {
                          (byte)0x90, (byte)0xAD, 0x00, 0x00, 0x07,
                          0x02, 0x00, 0x00, 0x00, 0x20, 0x00, 0x00, 0x00
                      };
                      byte[] readResp = iso.transceive(readCmd);
                      Log.i(TAG, uid + " READ resp=" + toHex(readResp));

                      if (readResp == null || readResp.length < 2) {
                          resolveReadError(call, "READ_FAILED", "Keine Antwort"); return;
                      }
                      int sw1 = readResp[readResp.length-2] & 0xFF;
                      int sw2 = readResp[readResp.length-1] & 0xFF;
                      if (sw1 == 0x91 && sw2 == 0x00) {
                          byte[] data = Arrays.copyOf(readResp, readResp.length - 2);
                          // Trim nulls
                          int len = data.length;
                          while (len > 0 && data[len-1] == 0) len--;
                          String status = new String(data, 0, len, StandardCharsets.UTF_8).trim();
                          JSObject r = new JSObject();
                          r.put("success", true);
                          r.put("status", status.isEmpty() ? "valid" : status);
                          call.resolve(r);
                      } else {
                          resolveReadError(call, "READ_FAILED", "SW=" + toHex(readResp));
                      }
                  } catch (Exception e) {
                      resolveReadError(call, "EXCEPTION", e.getMessage());
                  } finally {
                      try { iso.close(); } catch (Exception ignored) {}
                  }
              }

              // ── Helpers ───────────────────────────────────────────────────
              private boolean selectApp(IsoDep iso, String uid) throws Exception {
                  byte[] selApdu = new byte[5 + DF_NAME.length + 1];
                  selApdu[0]=0x00; selApdu[1]=(byte)0xA4; selApdu[2]=0x04;
                  selApdu[3]=0x00; selApdu[4]=(byte)DF_NAME.length;
                  System.arraycopy(DF_NAME, 0, selApdu, 5, DF_NAME.length);
                  selApdu[selApdu.length-1]=0x00;
                  byte[] selResp = iso.transceive(selApdu);
                  Log.d(TAG, uid + " SEL=" + toHex(selResp));
                  return isISO9000(selResp);
              }

              private String readTamperStatus(IsoDep iso, String uid) throws Exception {
                  if (!selectApp(iso, uid)) return "SELECT_FAILED";
                  byte[] ttCmd = {(byte)0x90,(byte)0xF7,0x00,0x00,0x00};
                  byte[] ttResp = iso.transceive(ttCmd);
                  Log.i(TAG, uid + " TT=" + toHex(ttResp));
                  if (ttResp == null || ttResp.length < 4) return "UNKNOWN";
                  int sw1 = ttResp[ttResp.length-2] & 0xFF;
                  int sw2 = ttResp[ttResp.length-1] & 0xFF;
                  if (sw1==0x91 && sw2==0x00) { return "" + (char)(ttResp[0]&0xFF) + (char)(ttResp[1]&0xFF); }
                  if (sw1==0x91 && sw2==0xAD) return "AUTH_REQUIRED";
                  if (sw1==0x91 && sw2==0x1C) return "II";
                  return String.format("SW_%02X%02X", sw1, sw2);
              }

              private boolean isISO9000(byte[] r) {
                  return r!=null && r.length>=2 && r[r.length-2]==(byte)0x90 && r[r.length-1]==(byte)0x00;
              }
              private boolean isNative9100(byte[] r) {
                  return r!=null && r.length>=2 && r[r.length-2]==(byte)0x91 && r[r.length-1]==(byte)0x00;
              }
              private static String toHex(byte[] b) {
                  if (b==null) return "null";
                  StringBuilder sb = new StringBuilder();
                  for (byte x : b) sb.append(String.format("%02X", x));
                  return sb.toString();
              }
              private void emitResult(String uid, String tamperStatus, String debug) {
                  JSObject r = new JSObject();
                  r.put("uid", uid); r.put("tamperStatus", tamperStatus); r.put("debug", debug);
                  notifyListeners("tagRead", r);
              }
              private void resolveWriteError(PluginCall call, String code, String msg) {
                  JSObject r = new JSObject();
                  r.put("success", false); r.put("errorCode", code); r.put("errorMessage", msg);
                  call.resolve(r);
              }
              private void resolveReadError(PluginCall call, String code, String msg) {
                  JSObject r = new JSObject();
                  r.put("success", false); r.put("errorCode", code); r.put("errorMessage", msg);
                  call.resolve(r);
              }
          }
          JAVAEOF

      - name: Patch AndroidManifest.xml for NFC
        run: |
          MANIFEST=android/app/src/main/AndroidManifest.xml
          sed -i '/<manifest /a\    <uses-permission android:name="android.permission.NFC" />\n    <uses-feature android:name="android.hardware.nfc" android:required="true" />' "$MANIFEST"
          sed -i 's|</activity>|        <intent-filter>\n                <action android:name="android.nfc.action.TECH_DISCOVERED" />\n            </intent-filter>\n            <meta-data android:name="android.nfc.action.TECH_DISCOVERED" android:resource="@xml/nfc_tech_filter" />\n        </activity>|' "$MANIFEST"

      - name: Write nfc_tech_filter.xml
        run: |
          mkdir -p android/app/src/main/res/xml
          cat > android/app/src/main/res/xml/nfc_tech_filter.xml << 'XMLEOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <tech-list><tech>android.nfc.tech.IsoDep</tech></tech-list>
              <tech-list><tech>android.nfc.tech.NfcA</tech></tech-list>
          </resources>
          XMLEOF

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK components
        run: |
          sdkmanager "platform-tools" "platforms;android-34" "build-tools;34.0.0"

      - name: Accept Android SDK licenses
        run: yes | sdkmanager --licenses || true

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build debug APK
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: ntag424-scanner-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Build summary
        run: |
          echo "## APK gebaut!" >> $GITHUB_STEP_SUMMARY
          echo "Download: **Artifacts → ntag424-scanner-debug**" >> $GITHUB_STEP_SUMMARY
